name: Build et Publication

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  # ── Build exécutable Windows ───────────────────────────────────────────────
  build-exe:
    name: Exécutable Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install pyinstaller google-genai python-dotenv reportlab rich

      - name: Builder pulse.exe
        run: pyinstaller --onefile --name pulse main.py

      # Sur push/main → artifact téléchargeable depuis l'onglet Actions
      - name: Uploader comme artifact (push sur main)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: pulse-windows
          path: dist/pulse.exe
          retention-days: 30

      # Sur release → joint à la Release GitHub
      - name: Attacher à la Release GitHub
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pulse.exe

  # ── Publication PyPI (uniquement sur release) ──────────────────────────────
  build-pypi:
    name: Package PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Builder le package
        run: pip install build && python -m build

      - name: Uploader les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-pypi
          path: dist/

  publish-pypi:
    name: Publier sur PyPI
    needs: build-pypi
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/codepulse/
    permissions:
      id-token: write
    steps:
      - name: Télécharger les artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist-pypi
          path: dist/

      - name: Publier sur PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
